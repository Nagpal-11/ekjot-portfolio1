<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekjot Singh Nagpal - Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-\[blob_10s_infinite\] { animation: blob 10s infinite; }
        .animate-\[blob_12s_infinite_2s\] { animation: blob 12s infinite 2s; }
        .animate-\[blob_14s_infinite_4s\] { animation: blob 14s infinite 4s; }

        .text-gradient-accent {
            background: linear-gradient(to right, #0071e3, #8b5cf6, #ec4899, #0071e3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% 300%;
            animation: gradient-move 8s ease infinite;
        }
        
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Basic resets */
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased selection:bg-[#0071e3] selection:text-white">
    
    <!-- React Root -->
    <div id="root"></div>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icon Components (Replaced lucide-react imports) ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Mail = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const Phone = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const Linkedin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>;
        const ChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Award = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
        const Briefcase = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
        const BookOpen = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Cpu = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2" ry="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const Trophy = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const X = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Send = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const Loader2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

        // --- Reveal Component ---
        const Reveal = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // --- ChatWidget Component ---
        const ChatWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'model', text: "Hi! I'm Pixie ✨ Ask me anything about Ekjot's AI research, hackathons, or skills!" }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                if (isOpen) scrollToBottom();
            }, [messages, isOpen]);

            const fetchWithRetry = async (url, options, maxRetries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        return await response.json();
                    } catch (error) {
                        if (i === maxRetries - 1) throw error;
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                
                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMessage }]);
                setIsLoading(true);

                const apiKey = "AIzaSyBYc__RQ_CWCDnTXl67Lha-fcaur3NPXd8"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const systemPrompt = `You are Pixie, a helpful, conversational AI assistant representing Ekjot Singh Nagpal.
                Context about Ekjot:
                - Computer Engineering student (2023-2027) at Mizoram University.
                - Tech Lead at Ayulex (TiLi Incubator, MeitY GENESIS grant winner).
                - AI Club Coordinator at Mizoram University.
                - 1st Prize Winner at Yuvamanthan Hackathon (AI healthcare solutions).
                - Winner of Milk Candy Case Study (Strategic roadmap).
                - IIT Kanpur Campus Ambassador.
                - Skills: AI, ML, Python, C/C++, DSA, Git, IoT.
                - Hobbies: Trekking, drawing, gaming.
                Respond as Pixie. Be enthusiastic, professional, and concise. Keep answers to 2-3 short sentences. Never mention Gemini or Google Flash.`;

                const apiHistory = messages.slice(1).map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.text }]
                }));

                const payload = {
                    contents: [...apiHistory, { role: 'user', parts: [{ text: userMessage }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                    const result = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const botResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having a little trouble connecting right now. Please try again later!";
                    setMessages(prev => [...prev, { role: 'model', text: botResponse }]);
                } catch (error) {
                    console.error("Chat error:", error);
                    setMessages(prev => [...prev, { role: 'model', text: "Whoops! An error occurred." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
                    {isOpen && (
                        <div className="mb-4 w-[350px] sm:w-[400px] h-[500px] bg-white/70 backdrop-blur-2xl border border-white/50 rounded-3xl shadow-[0_8px_40px_rgba(0,0,0,0.12)] flex flex-col overflow-hidden animate-in fade-in slide-in-from-bottom-5 duration-300">
                            {/* Header */}
                            <div className="px-6 py-4 bg-white/40 border-b border-white/50 flex justify-between items-center backdrop-blur-md">
                                <div className="flex items-center space-x-3">
                                    <div className="bg-gradient-to-r from-[#0071e3] to-[#ec4899] p-2 rounded-full shadow-sm">
                                        <Sparkles className="w-4 h-4 text-white" />
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-gray-900 tracking-tight">Pixie</h3>
                                        <p className="text-xs text-green-600 font-medium flex items-center">
                                            <span className="w-2 h-2 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>
                                            Active
                                        </p>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-500 hover:text-gray-900 transition-colors p-1.5 rounded-full hover:bg-white/60">
                                    <X className="w-5 h-5" />
                                </button>
                            </div>

                            {/* Chat Area */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${
                                            msg.role === 'user' 
                                                ? 'bg-[#0071e3] text-white rounded-tr-sm shadow-sm' 
                                                : 'bg-white/80 border border-gray-200 text-gray-800 rounded-tl-sm shadow-sm backdrop-blur-sm'
                                        }`}>
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start">
                                        <div className="bg-white/80 border border-gray-200 px-4 py-3.5 rounded-2xl rounded-tl-sm shadow-sm flex space-x-1.5 items-center backdrop-blur-sm">
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            {/* Input Area */}
                            <div className="p-4 bg-white/40 border-t border-white/50 backdrop-blur-md">
                                <div className="relative flex items-center">
                                    <input 
                                        type="text" 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                        placeholder="Ask me about Ekjot..." 
                                        className="w-full bg-white/60 border border-white/80 rounded-full px-5 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-[#0071e3]/30 placeholder-gray-500 shadow-inner"
                                    />
                                    <button 
                                        onClick={handleSend}
                                        disabled={!input.trim() || isLoading}
                                        className="absolute right-2 p-2 bg-[#0071e3] text-white rounded-full hover:bg-[#0077ED] disabled:opacity-50 transition-all shadow-sm"
                                    >
                                        {isLoading ? <Loader2 className="w-4 h-4 animate-spin" /> : <Send className="w-4 h-4 ml-0.5" />}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {!isOpen && (
                        <button 
                            onClick={() => setIsOpen(true)}
                            className="bg-white/80 backdrop-blur-xl border border-white/50 text-[#1d1d1f] p-3 pl-4 pr-5 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.1)] hover:shadow-[0_12px_40px_rgba(0,0,0,0.15)] hover:-translate-y-1 transition-all group flex items-center space-x-3"
                        >
                            <div className="bg-gradient-to-r from-[#0071e3] to-[#ec4899] p-2.5 rounded-full group-hover:scale-110 transition-transform shadow-sm">
                                <Sparkles className="w-5 h-5 text-white" />
                            </div>
                            <span className="font-semibold tracking-tight">Ask Pixie</span>
                        </button>
                    )}
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen bg-transparent text-[#1d1d1f] font-sans selection:bg-[#0071e3] selection:text-white relative overflow-hidden">
                    
                    {/* Dynamic Background */}
                    <div className="fixed inset-0 z-[-1] overflow-hidden bg-white">
                        <div className="absolute top-[0%] left-[10%] w-[50vw] h-[50vw] rounded-full bg-indigo-200/60 mix-blend-normal filter blur-[120px] animate-[blob_10s_infinite]"></div>
                        <div className="absolute top-[10%] right-[10%] w-[40vw] h-[40vw] rounded-full bg-cyan-100/70 mix-blend-normal filter blur-[100px] animate-[blob_12s_infinite_2s]"></div>
                        <div className="absolute bottom-[0%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-purple-200/50 mix-blend-normal filter blur-[130px] animate-[blob_14s_infinite_4s]"></div>
                        <div className="absolute inset-0 bg-[linear-gradient(to_right,#e2e8f0_1px,transparent_1px),linear-gradient(to_bottom,#e2e8f0_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_80%_80%_at_50%_50%,#000_70%,transparent_100%)]"></div>
                    </div>

                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/70 backdrop-blur-md border-b border-gray-200/50 shadow-sm' : 'bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex-shrink-0 cursor-pointer" onClick={() => scrollTo('home')}>
                                    <span className="font-semibold text-lg tracking-tight">Ekjot Nagpal</span>
                                </div>
                                <div className="hidden md:flex space-x-8 text-sm font-medium text-[#1d1d1f]/80">
                                    <button onClick={() => scrollTo('about')} className="hover:text-black transition-colors">About</button>
                                    <button onClick={() => scrollTo('achievements')} className="hover:text-black transition-colors">Achievements</button>
                                    <button onClick={() => scrollTo('experience')} className="hover:text-black transition-colors">Experience</button>
                                    <button onClick={() => scrollTo('skills')} className="hover:text-black transition-colors">Skills</button>
                                </div>
                                <div className="flex">
                                    <button onClick={() => scrollTo('contact')} className="bg-[#1d1d1f] text-white px-4 py-1.5 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors shadow-sm">
                                        Contact
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="home" className="pt-40 pb-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto flex flex-col items-center text-center relative z-10">
                        <Reveal>
                            <div className="inline-flex items-center space-x-2 bg-white/60 backdrop-blur-md border border-white/50 text-[#0071e3] px-3 py-1 rounded-full text-sm font-medium mb-8 shadow-sm">
                                <span className="relative flex h-2 w-2">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2 w-2 bg-[#0071e3]"></span>
                                </span>
                                <span>AI & ML Enthusiast</span>
                            </div>
                        </Reveal>
                        
                        <Reveal delay={200}>
                            <h1 className="text-6xl md:text-8xl font-bold tracking-tighter mb-6 leading-tight">
                                Innovating with <br className="hidden md:block" />
                                <span className="text-gradient-accent">
                                    Artificial Intelligence.
                                </span>
                            </h1>
                        </Reveal>
                        
                        <Reveal delay={400}>
                            <p className="text-xl md:text-2xl text-[#86868b] max-w-3xl mb-10 font-medium tracking-tight mx-auto">
                                I am Ekjot Singh Nagpal, a Computer Engineering student at Mizoram University passionate about building impactful, AI-driven solutions.
                            </p>
                        </Reveal>
                        
                        <Reveal delay={600}>
                            <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 justify-center">
                                <button 
                                    onClick={() => scrollTo('experience')}
                                    className="bg-[#0071e3] text-white px-8 py-4 rounded-full text-lg font-semibold hover:bg-[#0077ED] hover:scale-105 transition-all flex items-center justify-center space-x-2 shadow-[0_4px_14px_0_rgba(0,113,227,0.39)] hover:shadow-[0_6px_20px_rgba(0,113,227,0.23)]"
                                >
                                    <span>View My Work</span>
                                    <ChevronRight className="w-5 h-5" />
                                </button>
                                <button 
                                    onClick={() => scrollTo('about')}
                                    className="bg-white/60 backdrop-blur-md border border-white/50 text-[#1d1d1f] px-8 py-4 rounded-full text-lg font-semibold hover:bg-white hover:scale-105 transition-all shadow-sm"
                                >
                                    More About Me
                                </button>
                            </div>
                        </Reveal>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-24 relative z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <Reveal>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                                    <div>
                                        <h2 className="text-4xl font-bold tracking-tight mb-6">Driven by curiosity. <br/>Defined by discipline.</h2>
                                        <div className="space-y-6 text-[#86868b] text-lg leading-relaxed">
                                            <p>
                                                With a strong foundation in C/C++, Python, Data Structures, and Git, I am constantly exploring the frontiers of AI research and development. My goal is to build solutions that matter, especially within the healthcare domain.
                                            </p>
                                            <p>
                                                Beyond academics, I serve as the <strong>AI Club Coordinator</strong> at Mizoram University, fostering learning through workshops and hackathons. As an <strong>NCC cadet</strong>, I have cultivated leadership, teamwork, and discipline.
                                            </p>
                                            <p>
                                                When I'm away from the keyboard, I find joy in drawing, trekking, and experiencing the rain—nature's way of refreshing the soul. I'm also an avid e-gamer, thriving in competitive environments.
                                            </p>
                                        </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
